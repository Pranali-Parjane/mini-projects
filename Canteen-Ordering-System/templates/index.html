<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Ordering Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #333;
    }
    header {
      background: #000;
      color: #fff;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
    }
    header .btn {
      background: #f7c400;
      color: #000;
      padding: 8px 15px;
      border-radius: 5px;
      text-decoration: none;
    }
    .hero {
      background: url('https://i.pinimg.com/736x/46/23/3f/46233f969bbfe40b5a8f5fe321e63f37.jpg') no-repeat center/cover;
      color: #fff;
      text-align: center;
      padding: 100px 20px;
    }
    .hero h1 {
      font-size: 40px;
      margin-bottom: 15px;
    }
    .hero p {
      margin-bottom: 20px;
      font-size: 18px;
    }
    .search-box {
      max-width: 400px;
      margin: 0 auto;
      display: flex;
    }
    .search-box input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }
    .search-box button {
      background: #f7c400;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
    }
    .section {
      padding: 50px 20px;
      text-align: center;
    }
    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .categories div {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }
    .categories div:hover {
      background: #f7f7f7;
      transform: scale(1.05);
    }
    .categories img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
    }
    .popular-food {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .popular-food div {
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      text-align: center;
      transition: 0.3s;
    }
    .popular-food div:hover {
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transform: translateY(-5px);
    }
    .popular-food img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .popular-food p {
      padding: 10px;
      font-weight: bold;
    }
    .popular-food button {
      background: #f7c400;
      border: none;
      padding: 10px 20px;
      margin-bottom: 15px;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }
    .popular-food button:hover {
      background: #e6b800;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h2>Canteen Ordering System</h2>
    <nav>
      <a href="">Home</a>
      <a href="menup.html">Menu</a>
      <a href="canteen-admin.html">Admin</a>
     
    </nav>
   
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1>Order Healthy And Fresh Food Any Time</h1>
    <p>Your Favorite Meals, Just a Click Away.</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search Keywords">
      <button onclick="searchFood()">🔍</button>
    </div>
  </section>

  <!-- Categories -->
  <section class="section">
    <h2>Our Categories</h2>
    <div class="categories">
      <div><img src="https://i.pinimg.com/736x/ab/e6/57/abe65721a6d06545c99230151aab0177.jpg"/><p>Fast Foods</p></div>
      <div><img src="https://i.pinimg.com/736x/f0/65/5f/f0655f2737da76be9b4ac435c65e3d9b.jpg"/><p>Beverages</p></div>
      <div><img src="https://i.pinimg.com/736x/57/0e/fe/570efeef8f6064530581266d73d13252.jpg"/><p>Chinese<p></p></div>
      <div><img src="https://i.pinimg.com/1200x/cc/6c/7b/cc6c7b9aba027551a344e6cc54e8a6a3.jpg"/><p>South Indian</p></div>
      <div><img src="https://i.pinimg.com/1200x/52/55/20/5255204f7d386ac98d48c79089ba05c6.jpg"/><p>Snacks</p></div>
      <div><img src="https://i.pinimg.com/736x/e5/06/88/e5068840ee813886af0aeda9b08985f6.jpg"/><p>Breakfast</p></div>
      <div><img src="https://i.pinimg.com/736x/eb/61/c8/eb61c818c33a1c5ee295c21705f92281.jpg"/><p>North Indian</p></div>
      <div><img src="https://i.pinimg.com/736x/3f/31/0a/3f310ad871795db4fcde07d287de4f78.jpg"/><p>Desserts</p></div>
    </div>
  </section>

  <!-- Popular Canteen Food -->
  <section class="section">
    <h2>Popular Food</h2>
    <div class="popular-food">
      <div>
        <img src="https://i.pinimg.com/736x/01/cc/a6/01cca6bed9f12375b73c697b7bb25b79.jpg" alt="">
        <p>Hot Drinks & Snacks</p>


      </div>
      <div>
        <img src="https://i.pinimg.com/1200x/51/c7/e0/51c7e071a9a1e69f5f85bb9ddf1a798a.jpg" alt="">
        <p> Sandwich Corner</p>
   



      </div>
      <div>
        <img src="https://i.pinimg.com/1200x/60/09/4f/60094fc8a14d2759792de2fcfb4abdd8.jpg" alt="">
        <p>Pizza and Fries</p>
 
      </div>
    </div>
  </section>

  <!-- Firebase Configuration -->

  <script type="module" src="../firebase-config.js"></script><!--contains Firebase connection credentials.-->
  <script type="module" src="../firebase-services.js"></script><!--contains functions for reading/writing food data in Firebase.-->
  
  <script type="module">
    let menuService;
    
    // Initialize Firebase services
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        while (!window.db) {
          await new Promise(resolve => setTimeout(resolve, 100));
        }
        menuService = new MenuService(window.db);
        await menuService.initializeMenuData();
        console.log('Firebase services initialized on homepage');
      } catch (error) {
        console.error('Error initializing Firebase services:', error);
      }
    });
    
    // Search function
    window.searchFood = async function() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) {
        alert('Please enter a search term');
        return;
      }
      
      if (!menuService) {
        alert('Firebase services not initialized. Please refresh the page.');
        return;
      }
      
      try {
        const results = await menuService.searchMenuItems(query);
        if (results.length === 0) {
          alert('No food items found');
        } else {
          // Redirect to menu page with search results
          window.location.href = `menup.html?search=${encodeURIComponent(query)}`;
        }
      } catch (error) {
        console.error('Search error:', error);
        alert('Error searching menu items');
      }
    };
    
    // Allow Enter key to trigger search
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchFood();
      }
    });
  </script>

</body>
</html>
